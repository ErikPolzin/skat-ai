steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/skat-server:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/skat-server:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'skat-server'
      - '--image=gcr.io/$PROJECT_ID/skat-server:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--set-env-vars=TURSO_DB_URL=${_TURSO_DB_URL}'
      - '--set-env-vars=TURSO_AUTH_TOKEN=${_TURSO_AUTH_TOKEN}'
      - '--set-env-vars=CORS_ORIGIN=${_CORS_ORIGIN}'

images:
  - 'gcr.io/$PROJECT_ID/skat-server:$COMMIT_SHA'

substitutions:
  _TURSO_DB_URL: '${TURSO_DB_URL}'  # Set via gcloud builds submit --substitutions
  _TURSO_AUTH_TOKEN: '${TURSO_AUTH_TOKEN}'  # Set via gcloud builds submit --substitutions
  _CORS_ORIGIN: 'https://skat-ai-6fa5a.web.app'  # Update with your Firebase URL
